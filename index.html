<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auxxin - Online Cybersecurity Learning Platform</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <button onclick="doSomething()">Click Me</button>
    <p id="output">hello</p>
    <script>
        function doSomething() {
            if (document.getElementById("output").innerText == "hello") {
                document.getElementById("output").innerText = "goodbye";
            } else {
                document.getElementById("output").innerText = "hello";
            }
        }
    </script>
</body>
